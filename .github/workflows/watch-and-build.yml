name: Watch Kubo & build bundled kubo-ds-s3

on:
  schedule:
    - cron: "0 6 * * *"   # daily at 06:00 UTC
  workflow_dispatch:
    inputs:
      kubo_version:
        description: "Build a specific kubo version (e.g. v0.42.0); empty = latest stable"
        required: false
        default: ""
      force:
        description: "Rebuild even if the identity is unchanged"
        type: boolean
        required: false
        default: false

concurrency:
  group: watch-and-build
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

env:
  KUBO_REPO: ${{ vars.KUBO_REPO || 'ipfs/kubo' }}
  GO_DS_S3_REPO: ${{ vars.GO_DS_S3_REPO || 'ipfs/go-ds-s3' }}
  GO_DS_S3_BRANCH: ${{ vars.GO_DS_S3_BRANCH || 'master' }}

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      should_build: ${{ steps.decide.outputs.should_build }}
      kubo_version: ${{ steps.decide.outputs.kubo_version }}
      go_version: ${{ steps.decide.outputs.go_version }}
      s3_sha: ${{ steps.decide.outputs.s3_sha }}
      s3_plugin_version: ${{ steps.decide.outputs.s3_plugin_version }}
      rev: ${{ steps.decide.outputs.rev }}
      tag: ${{ steps.decide.outputs.tag }}
    steps:
      - name: Decide what to build
        id: decide
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_KUBO: ${{ github.event.inputs.kubo_version }}
          INPUT_FORCE: ${{ github.event.inputs.force }}
        run: |
          set -euo pipefail

          # 1) kubo version: from input or latest stable
          if [ -n "${INPUT_KUBO:-}" ]; then
            KUBO_VER="$INPUT_KUBO"
            echo "$KUBO_VER" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$' \
              || { echo "::error::kubo_version '$KUBO_VER' is not a stable release"; exit 1; }
          else
            KUBO_VER=$(gh api --paginate "repos/${KUBO_REPO}/releases" \
              --jq '.[] | select(.prerelease==false and .draft==false) | .tag_name' \
              | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n1) || true
          fi
          [ -n "$KUBO_VER" ] || { echo "::error::no stable kubo release found"; exit 1; }

          # 2) Go version: 'go' directive from kubo go.mod at the tag; fallback to .tool-versions
          GODIR=$(curl -fsSL "https://raw.githubusercontent.com/${KUBO_REPO}/${KUBO_VER}/go.mod" \
            | awk '/^go [0-9]/{v=$2} END{print v}')
          if echo "$GODIR" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            GO_VERSION="$GODIR"
          else
            TV=$(curl -fsSL "https://raw.githubusercontent.com/ipfs/distributions/master/.tool-versions" \
              | awk '/^golang /{v=$2} END{print v}')
            if echo "$TV" | grep -qE "^${GODIR}\."; then GO_VERSION="$TV"; else GO_VERSION="$GODIR"; fi
          fi

          # 3) Current go-ds-s3 source
          S3_SHA=$(gh api "repos/${GO_DS_S3_REPO}/commits/${GO_DS_S3_BRANCH}" --jq .sha)
          S3_PLUGIN_VERSION=$(gh api "repos/${GO_DS_S3_REPO}/contents/version.json?ref=${GO_DS_S3_BRANCH}" \
            --jq '.content' | base64 -d | jq -r '.version' 2>/dev/null || echo "unknown")

          # 4) Compare against this repo's existing releases
          PREFIX="kubo-ds-s3/${KUBO_VER}+build."
          EXISTING=$(gh api --paginate "repos/${GITHUB_REPOSITORY}/releases" --jq '.[].tag_name' \
            | grep -F "$PREFIX" || true)
          FORCE="${INPUT_FORCE:-false}"
          if [ -z "$EXISTING" ]; then
            REV=1; SHOULD_BUILD=true
          else
            MAXREV=$(echo "$EXISTING" | sed "s#.*+build\.##" | sort -n | tail -n1)
            LATEST_TAG="${PREFIX}${MAXREV}"
            PREV_SHA=$(gh release view "$LATEST_TAG" --repo "${GITHUB_REPOSITORY}" --json body \
              --jq .body | sed -n 's/.*s3_source_sha:[[:space:]]*//p' | tr -d '\r' | head -n1) || true
            if [ "$FORCE" = "true" ] || [ "$PREV_SHA" != "$S3_SHA" ]; then
              REV=$((MAXREV+1)); SHOULD_BUILD=true
            else
              REV="$MAXREV"; SHOULD_BUILD=false
            fi
          fi
          TAG="${PREFIX}${REV}"

          {
            echo "should_build=$SHOULD_BUILD"
            echo "kubo_version=$KUBO_VER"
            echo "go_version=$GO_VERSION"
            echo "s3_sha=$S3_SHA"
            echo "s3_plugin_version=$S3_PLUGIN_VERSION"
            echo "rev=$REV"
            echo "tag=$TAG"
          } >> "$GITHUB_OUTPUT"
          echo "::notice::build=$SHOULD_BUILD kubo=$KUBO_VER go=$GO_VERSION rev=$REV s3=$S3_SHA"

  build:
    needs: discover
    if: needs.discover.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      packages: write
    env:
      KUBO_VERSION: ${{ needs.discover.outputs.kubo_version }}
      GO_VERSION: ${{ needs.discover.outputs.go_version }}
      S3_SHA: ${{ needs.discover.outputs.s3_sha }}
      S3_PLUGIN_VERSION: ${{ needs.discover.outputs.s3_plugin_version }}
      REV: ${{ needs.discover.outputs.rev }}
      TAG: ${{ needs.discover.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve GHCR image name (lowercase)
        id: img
        run: echo "image=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/kubo-ds-s3" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (linux/amd64, s3ds bundled)
        env:
          IMAGE: ${{ steps.img.outputs.image }}
        run: |
          docker build --platform linux/amd64 \
            --build-arg KUBO_VERSION="$KUBO_VERSION" \
            --build-arg GO_DS_S3_REF="$S3_SHA" \
            --build-arg GO_VERSION="$GO_VERSION" \
            -t "${IMAGE}:${KUBO_VERSION}" \
            -t "${IMAGE}:${KUBO_VERSION}-build.${REV}" \
            -t "${IMAGE}:latest" \
            .

      - name: Extract the bundled ipfs binary
        env:
          IMAGE: ${{ steps.img.outputs.image }}
        run: |
          cid=$(docker create "${IMAGE}:${KUBO_VERSION}")
          bin="kubo-ds-s3_kubo-${KUBO_VERSION}_linux-amd64"
          docker cp "$cid:/usr/local/bin/ipfs" "$bin"
          docker rm "$cid" >/dev/null
          chmod +x "$bin"
          sha256sum "$bin" | awk -v f="$bin" '{print $1"  "f}' > "${bin}.sha256"
          echo "BIN=$bin" >> "$GITHUB_ENV"
          file "$bin" || true

      - name: Push image to GHCR
        env:
          IMAGE: ${{ steps.img.outputs.image }}
        run: |
          docker push "${IMAGE}:${KUBO_VERSION}"
          docker push "${IMAGE}:${KUBO_VERSION}-build.${REV}"
          docker push "${IMAGE}:latest"

      - name: Compose release notes
        env:
          IMAGE: ${{ steps.img.outputs.image }}
        run: |
          set -euo pipefail
          {
            echo "<!-- build-meta"
            echo "kubo_version: ${KUBO_VERSION}"
            echo "go_version: ${GO_VERSION}"
            echo "s3_source_sha: ${S3_SHA}"
            echo "s3_plugin_version: ${S3_PLUGIN_VERSION}"
            echo "rev: ${REV}"
            echo "-->"
            echo
            echo "Kubo **${KUBO_VERSION}** with the **go-ds-s3** (\`s3ds\`) datastore compiled in (bundled)."
            echo
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Kubo version | \`${KUBO_VERSION}\` |"
            echo "| Go toolchain | \`${GO_VERSION}\` |"
            echo "| go-ds-s3 source | \`${S3_SHA}\` |"
            echo "| go-ds-s3 version | \`${S3_PLUGIN_VERSION}\` |"
            echo
            echo "### Docker image (GHCR)"
            echo '```bash'
            echo "docker pull ${IMAGE}:${KUBO_VERSION}"
            echo '```'
            echo "Tags: \`${KUBO_VERSION}\`, \`${KUBO_VERSION}-build.${REV}\`, \`latest\`."
            echo
            echo "### Binary"
            echo "\`kubo-ds-s3_kubo-${KUBO_VERSION}_linux-amd64\` is a drop-in \`ipfs\` (linux/amd64, static)."
            echo "Verify with the \`.sha256\`. See the README for configuring the \`s3ds\` datastore."
          } > notes.md

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: "kubo-ds-s3 · kubo ${{ env.KUBO_VERSION }} · build ${{ env.REV }}"
          body_path: notes.md
          make_latest: true
          files: |
            ${{ env.BIN }}
            ${{ env.BIN }}.sha256
